<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Gaming Universe</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #050816;
            color: white;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 999;
        }

        .logo {
            color: #00e5ff;
            font-size: 28px;
            font-weight: 800;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: #00e5ff;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80') center/cover;
        }

        .hero h1 {
            font-size: 60px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .blue {
            background: #00e5ff;
            color: black;
        }

        .purple {
            background: #7c3aed;
            color: white;
        }

        section {
            padding: 80px 40px;
            text-align: center;
        }

        .card {
            background: #111827;
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            display: inline-block;
            width: 250px;
        }

        footer {
            padding: 30px;
            text-align: center;
            background: black;
            margin-top: 40px;
        }
    </style>

</head>

<body>

    <audio id="bgMusic" autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <nav>
        <div class="logo">MUHAMMAD</div>
        <div>
            <a href="#games">Games</a>
            <a href="#gallery">Gallery</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="hero">

        <div>

            <h1>Gaming Universe 🎮</h1>

            <button class="btn blue" onclick="clickSound();scrollToSection('games')">Explore Games</button>

            <button class="btn purple" onclick="clickSound();showMsg('Trailer Coming Soon!')">Watch Trailer</button>

        </div>

    </div>

    <section id="games">

        <h2>Popular Games</h2>

        <div class="card">
            <h3>Racing Game</h3>
            <button class="btn blue" onclick="clickSound();openGame('Racing Game')">Play</button>
        </div>

        <div class="card">
            <h3>Minecraft World</h3>
            <button class="btn blue" onclick="clickSound();openGame('Minecraft')">Play</button>
        </div>

        <div class="card">
            <h3>Battle Arena</h3>
            <button class="btn blue" onclick="clickSound();openGame('Battle Arena')">Play</button>
        </div>

    </section>

    <section id="gallery">

        <h2>Gallery</h2>

        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" width="300">
        <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8" width="300">

    </section>

    <section id="contact">

        <h2>Contact</h2>

        <button class="btn purple" onclick="clickSound();showMsg('Email Sent!')">
            Send Message
        </button>

    </section>

    <div style="margin:20px;text-align:center;">
        <p style="color:gray;">Ad will show here after approval</p>
    </div>

    <footer>
        <p>© Muhammad Gaming Universe</p>
    </footer>

    <script>

        function clickSound() {
            let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
            audio.play();
        }

        function showMsg(msg) {
            alert(msg);
        }

        function openGame(game) {
            alert("Opening " + game + "...");
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: "smooth" });
        }

    </script>
<script>

    function clickSound() {
        let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
        audio.play();
    }

    function showMsg(msg) {
        alert(msg);
    }

    function openGame(game) {

        let urls = {
            "Racing Game": "https://poki.com/en/g/racing",
            "Minecraft": "https://classic.minecraft.net/",
            "Battle Arena": "https://poki.com/en/g/forward-assault"
        };

        if (urls[game]) {
            window.open(urls[game], "_blank");
        } else {
            alert("Game not found!");
        }
    }

    function scrollToSection(id) {
        document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }

</script>
<button class="btn purple" onclick="clickSound();openTrailer()">
    Watch Trailer
</button> 
</body>

</html>
