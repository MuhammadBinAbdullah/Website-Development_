<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Turbo Racer</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            z-index: 10;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 20px;
            display: none;
            z-index: 20;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="ui">Score: 0</div>
    <div id="gameOver">💥 GAME OVER 💥<br>Refresh to Play Again</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 10, 10);
        scene.add(light);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const roadGeometry = new THREE.BoxGeometry(10, 0.1, 200);
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        scene.add(road);

        const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lines = [];

        for (let i = 0; i < 20; i++) {
            const line = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.01, 4),
                lineMaterial
            );

            line.position.z = i * -10;
            line.position.y = 0.06;
            scene.add(line);
            lines.push(line);
        }

        const playerGeometry = new THREE.BoxGeometry(1.5, 1, 3);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);

        player.position.y = 0.6;
        player.position.z = 5;
        scene.add(player);

        camera.position.set(0, 6, 12);
        camera.lookAt(player.position);

        let keys = {};
        let enemies = [];
        let score = 0;
        let speed = 0.5;
        let gameRunning = true;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function createEnemy() {
            const geometry = new THREE.BoxGeometry(1.5, 1, 3);
            const material = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff
            });

            const enemy = new THREE.Mesh(geometry, material);

            enemy.position.x = [-3, 0, 3][Math.floor(Math.random() * 3)];
            enemy.position.y = 0.6;
            enemy.position.z = -100;

            scene.add(enemy);
            enemies.push(enemy);
        }

        setInterval(() => {
            if (gameRunning) createEnemy();
        }, 1200);

        function movePlayer() {
            if (keys['ArrowLeft'] && player.position.x > -3.5) {
                player.position.x -= 0.2;
            }

            if (keys['ArrowRight'] && player.position.x < 3.5) {
                player.position.x += 0.2;
            }
        }

        function moveEnemies() {
            enemies.forEach((enemy, index) => {
                enemy.position.z += speed;

                if (enemy.position.z > 10) {
                    score++;
                    document.getElementById('ui').innerText = 'Score: ' + score;

                    scene.remove(enemy);
                    enemies.splice(index, 1);

                    if (score % 5 === 0) {
                        speed += 0.1;
                    }
                }

                if (
                    Math.abs(enemy.position.z - player.position.z) < 2 &&
                    Math.abs(enemy.position.x - player.position.x) < 1
                ) {
                    gameRunning = false;
                    document.getElementById('gameOver').style.display = 'block';
                }
            });
        }

        function animateRoad() {
            lines.forEach(line => {
                line.position.z += speed;

                if (line.position.z > 10) {
                    line.position.z = -180;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameRunning) {
                movePlayer();
                moveEnemies();
                animateRoad();
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
