<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>My Super Hero Card</title>
   <style>
      body{
         background-color: darkblue;
         color: white;
         font-family: Arial, sans-serif;
      }
      .hero_name{
         font-size: 60px;
         font-weight: bold;
         color: yellow;
         text-shadow: 3px 3px orange;
      }
      .tagline{
         font-style: italic;
         color: lightblue;
      }
      .label{
         text-transform: uppercase;
         text-decoration: underline;
         color: coral;
      }
      .Power{
         font-weight: bold;
         color: lightgreen;
      }
      .Weakness{
         text-decoration: line-through;
         color: gray;
      }
      .Badge{
         font-size:28px ;
         font-weight: bold;
         color: gold;
         transform: rotate(15deg);
      }
      .MadeBy{
         text-transform: capitalize;
         text-decoration: dashed;
         color: coral;
         font-style: italic;
      }
   </style>
</head>
<body>
   <h1 class="hero_name">Thunder Kids</h1>
   <p class="tagline">The Most Powerful Hero In School</p>

   <h2 class="label">Super Powers</h2>
   <p class="Power">Can Run Faster Than Cheetah</p>
   <p class="Power">Can Lift A School Bus</p>

   <h2 class="label">Weaknesses</h2>
   <p class="Weakness">Math's Homework</p>
   <p class="Weakness">Broccoli</p>

   <p class="Badge">Top Hero</p>

   <p class="MadeBy">Created By Muhammad </p>

</body>
</html>
